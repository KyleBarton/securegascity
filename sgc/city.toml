[workspace]
name = "__CITY_NAME__"

[providers.nono]
display_name = "Nono"
command = "nono"
args = [
  "run",
  "--profile", "gc-__CITY_NAME__-worker",
  "--allow-cwd",
  "--",
  "claude"
]
prompt_mode = "arg"
ready_delay_ms = 3000
ready_prompt_prefix = "> "
process_names = ["nono"]
instructions_file = "AGENTS.md"

# Uncomment if nono supports session resume:
# resume_flag = "--resume"
# resume_style = "flag"

[[agent]]
name = "mayor"
provider = "nono"

[agent.env]
CLAUDE_CONFIG_DIR = "__CITY_PATH__/.claude"

[[named_session]]
template = "mayor"
mode = "always"