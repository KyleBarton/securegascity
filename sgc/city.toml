[workspace]
name = "__CITY_NAME__"

[providers.nono]
display_name = "Nono"
command = "nono"
args = [
  "run",
  "--profile", "gc___CITY_NAME___worker",
  "--",
]
prompt_mode = "arg"
ready_delay_ms = 3000
ready_prompt_prefix = "> "
process_names = ["nono"]
instructions_file = "AGENTS.md"

# Uncomment if nono supports session resume:
# resume_flag = "--resume"
# resume_style = "flag"

[[agent]]
name = "worker"
provider = "nono"
# Claude Code CLI — nono injects ANTHROPIC_BASE_URL and NONO_PROXY_TOKEN
# automatically via the credential binding in the worker profile.
start_command = "claude"
