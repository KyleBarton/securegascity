[workspace]
name = "__CITY_NAME__"

[beads]
provider = "file"

[providers.nono]
display_name = "Nono"
command = "nono"
args = [
  "run",
  "--profile", "gc-__CITY_NAME__-worker",
  "--allow-cwd",
  "--",
  "env", "HOME=__CITY_PATH__/home", "claude"
]
prompt_mode = "arg"
ready_delay_ms = 3000
ready_prompt_prefix = "❯ "
process_names = ["nono"]
instructions_file = "AGENTS.md"

# Uncomment if nono supports session resume:
# resume_flag = "--resume"
# resume_style = "flag"
